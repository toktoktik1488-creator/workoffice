<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Meta Pixel -->

</head>

<body>

<div class="container">

<div id="jobs"></div>

</div>

<script>

const lang = localStorage.getItem("vacancyLang")

fetch("/vacancies")

.then(res => res.json())

.then(data => {

const container = document.getElementById("jobs")

const jobs = data.filter(v => v.language === lang)

if(jobs.length === 0){

container.innerHTML = `

<div class="jobCard">

<h2>Наразі вакансій немає</h2>

<p>Будь ласка, оберіть іншу мову</p>

<button onclick="window.location='/'">
Обрати іншу мову
</button>

</div>

`

return

}

jobs.forEach(job => {

const div = document.createElement("div")

div.className = "jobCard"

div.innerHTML = `

<h2>${job.title}</h2>

<p><strong>Місто:</strong> ${job.city}</p>

<p><strong>Зарплата:</strong> ${job.salary}</p>

<p class="jobDescription">${job.description}</p>

<button onclick="openVacancy('${job.title}')">
Подати заявку
</button>

`

container.appendChild(div)

})

})


function openVacancy(title){

localStorage.setItem("vacancyTitle", title)

window.location = "/vacancy.html"

}

</script>

</body>

</html>
